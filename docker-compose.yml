version: '3.8'

services:
    postgres:
        image: postgres:16
        container_name: event-ticket-postgres
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: event_ticket_db
          POSTGRES_INITDB_ARGS: "-c password_encryption=md5"
        ports:
          - "5432:5432"
        volumes:
          - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: